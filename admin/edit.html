<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar entrada — Admin</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 800px;">
    <div class="mb-3"><a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Volver</a></div>
    <h1 class="h3 mb-4" id="tit-pag">Nueva entrada</h1>
    <div id="msg" class="alert alert-danger d-none"></div>
    <form id="f" class="card card-body shadow-sm">
        <input type="hidden" name="id" id="fid" value="0">
        <div class="mb-3">
            <label class="form-label" for="title">Título</label>
            <input type="text" class="form-control" id="title" required maxlength="200">
        </div>
        <div class="mb-3">
            <label class="form-label" for="slug">Slug (URL)</label>
            <input type="text" class="form-control" id="slug" maxlength="120" placeholder="auto si vacío">
            <div class="form-text">Letras minúsculas, números y guiones.</div>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label" for="category">Categoría</label>
                <input type="text" class="form-control" id="category" maxlength="80">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="read_minutes">Min. lectura</label>
                <input type="number" class="form-control" id="read_minutes" min="1" max="120" value="5">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="gradient">Franja color</label>
                <select class="form-select" id="gradient">
                    <option value="a">Violeta / azul</option>
                    <option value="b">Verde</option>
                    <option value="c">Índigo / verde</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="excerpt">Resumen</label>
            <textarea class="form-control" id="excerpt" rows="2" maxlength="500" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label" for="body">Cuerpo (HTML)</label>
            <textarea class="form-control font-monospace small" id="body" rows="14" required></textarea>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label" for="cta_label">Texto del botón</label>
                <input type="text" class="form-control" id="cta_label" maxlength="80" value="Contacto">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="cta_url">Enlace del botón</label>
                <input type="text" class="form-control" id="cta_url" maxlength="200" value="contact.html">
            </div>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="published" checked>
            <label class="form-check-label" for="published">Publicado</label>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</div>
<script>
(function () {
  var msg = document.getElementById('msg');
  var params = new URLSearchParams(location.search);
  var editId = parseInt(params.get('id') || '0', 10) || 0;

  fetch('/api/admin/session', { credentials: 'include' }).then(function (r) {
    if (!r.ok) location.replace('index.html');
  });

  function fill(p) {
    document.getElementById('fid').value = String(p.id || 0);
    document.getElementById('title').value = p.title || '';
    document.getElementById('slug').value = p.slug || '';
    document.getElementById('category').value = p.category || '';
    document.getElementById('read_minutes').value = p.read_minutes || 5;
    document.getElementById('gradient').value = ['a', 'b', 'c'].indexOf(p.gradient) >= 0 ? p.gradient : 'a';
    document.getElementById('excerpt').value = p.excerpt || '';
    document.getElementById('body').value = p.body || '';
    document.getElementById('cta_label').value = p.cta_label || 'Contacto';
    document.getElementById('cta_url').value = p.cta_url || 'contact.html';
    document.getElementById('published').checked = !!p.published;
  }

  if (editId) {
    document.getElementById('tit-pag').textContent = 'Editar entrada';
    fetch('/api/admin/posts', { credentials: 'include' })
      .then(function (r) {
        if (r.status === 401) {
          location.replace('index.html');
          return null;
        }
        return r.json();
      })
      .then(function (data) {
        if (!data) return;
        var p = (data.posts || []).find(function (x) { return parseInt(x.id, 10) === editId; });
        if (!p) {
          msg.textContent = 'Entrada no encontrada';
          msg.classList.remove('d-none');
          return;
        }
        fill(p);
      });
  }

  document.getElementById('f').addEventListener('submit', function (e) {
    e.preventDefault();
    msg.classList.add('d-none');
    var post = {
      id: parseInt(document.getElementById('fid').value, 10) || 0,
      title: document.getElementById('title').value.trim(),
      slug: document.getElementById('slug').value.trim(),
      category: document.getElementById('category').value.trim(),
      read_minutes: parseInt(document.getElementById('read_minutes').value, 10) || 5,
      gradient: document.getElementById('gradient').value,
      excerpt: document.getElementById('excerpt').value.trim(),
      body: document.getElementById('body').value,
      cta_label: document.getElementById('cta_label').value.trim(),
      cta_url: document.getElementById('cta_url').value.trim(),
      published: document.getElementById('published').checked
    };
    fetch('/api/admin/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ post: post })
    })
      .then(function (r) { return r.json().then(function (j) { return { r: r, j: j }; }); })
      .then(function (x) {
        if (x.r.ok && x.j.ok) location.href = 'dashboard.html';
        else {
          msg.textContent = (x.j && x.j.error) || 'Error al guardar';
          msg.classList.remove('d-none');
        }
      })
      .catch(function () {
        msg.textContent = 'Error de red';
        msg.classList.remove('d-none');
      });
  });
})();
</script>
</body>
</html>
