<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entradas — Admin blog</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="h3 mb-0">Blog</h1>
        <div>
            <a href="edit.html" class="btn btn-primary btn-sm">Nueva entrada</a>
            <a href="../blog.html" class="btn btn-outline-secondary btn-sm" target="_blank" rel="noopener">Ver sitio</a>
            <button type="button" class="btn btn-outline-danger btn-sm" id="btn-out">Salir</button>
        </div>
    </div>
    <div id="msg" class="alert alert-danger d-none"></div>
    <div class="table-responsive card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Título</th><th>Slug</th><th>Categoría</th><th>Estado</th><th>Fecha</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <p id="empty" class="text-muted mt-3 d-none">No hay entradas.</p>
</div>
<script>
(function () {
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  fetch('/api/admin/session', { credentials: 'include' }).then(function (r) {
    if (!r.ok) location.replace('index.html');
  });

  document.getElementById('btn-out').addEventListener('click', function () {
    fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }).then(function () {
      location.replace('index.html');
    });
  });

  var msg = document.getElementById('msg');
  fetch('/api/admin/posts', { credentials: 'include' })
    .then(function (r) {
      if (r.status === 401) {
        location.replace('index.html');
        return null;
      }
      if (!r.ok) throw new Error('Error ' + r.status);
      return r.json();
    })
    .then(function (data) {
      if (!data) return;
      var posts = data.posts || [];
      var tb = document.getElementById('tbody');
      if (posts.length === 0) {
        document.getElementById('empty').classList.remove('d-none');
        return;
      }
      tb.innerHTML = posts.map(function (p) {
        var id = parseInt(p.id, 10);
        var pub = p.published ? '<span class="text-success">Publicado</span>' : '<span class="text-secondary">Borrador</span>';
        var d = (p.created_at || '').slice(0, 10);
        return (
          '<tr><td>' + esc(p.title || '') + '</td><td><code class="small">' + esc(p.slug || '') + '</code></td><td>' +
          esc(p.category || '') + '</td><td>' + pub + '</td><td class="small">' + esc(d) +
          '</td><td class="text-nowrap"><a class="btn btn-sm btn-outline-primary" href="edit.html?id=' + id + '">Editar</a> ' +
          '<button type="button" class="btn btn-sm btn-outline-danger btn-del" data-id="' + id + '">Eliminar</button></td></tr>'
        );
      }).join('');

      tb.querySelectorAll('.btn-del').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (!confirm('¿Eliminar esta entrada?')) return;
          var id = btn.getAttribute('data-id');
          fetch('/api/admin/posts?id=' + encodeURIComponent(id), { method: 'DELETE', credentials: 'include' })
            .then(function (r) {
              if (!r.ok) throw new Error();
              location.reload();
            })
            .catch(function () {
              msg.textContent = 'No se pudo eliminar';
              msg.classList.remove('d-none');
            });
        });
      });
    })
    .catch(function () {
      msg.textContent = 'No se pudo cargar el listado (¿Redis y variables en Vercel?)';
      msg.classList.remove('d-none');
    });
})();
</script>
</body>
</html>
