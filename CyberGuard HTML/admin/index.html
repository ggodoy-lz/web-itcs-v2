<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — Blog iTCS</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/itcs-theme.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 420px;">
    <h1 class="h4 mb-4">Administración del blog</h1>
    <div id="err" class="alert alert-danger d-none" role="alert"></div>
    <form id="form-login" class="card card-body shadow-sm">
        <div class="mb-3">
            <label class="form-label" for="pw">Contraseña</label>
            <input type="password" class="form-control" id="pw" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btn-go">Entrar</button>
    </form>
    <p class="small text-muted mt-3 mb-0">Vercel: definí <code>ADMIN_PASSWORD</code> y <code>JWT_SECRET</code> (16+ caracteres) en Environment Variables. Datos en Redis Upstash.</p>
</div>
<script>
(function () {
  fetch('/api/admin/session', { credentials: 'include' }).then(function (r) {
    if (r.ok) location.replace('dashboard.html');
  });
  var form = document.getElementById('form-login');
  var err = document.getElementById('err');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.classList.add('d-none');
    var pw = document.getElementById('pw').value;
    fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ password: pw })
    })
      .then(function (r) { return r.json().then(function (j) { return { r: r, j: j }; }); })
      .then(function (x) {
        if (x.j.ok) location.replace('dashboard.html');
        else {
          err.textContent = x.j.error || 'No se pudo iniciar sesión';
          err.classList.remove('d-none');
        }
      })
      .catch(function () {
        err.textContent = 'Error de red';
        err.classList.remove('d-none');
      });
  });
})();
</script>
</body>
</html>
